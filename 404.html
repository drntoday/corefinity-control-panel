<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Redirect to index.html for SPA routing on GitHub Pages
        var path = window.location.pathname;
        var basePath = '/corefinity-control-panel/';
        
        // Remove the base path from the current path
        if (path.startsWith(basePath)) {
            path = path.substring(basePath.length - 1); // Keep the leading slash
        }
        
        // Redirect to index.html with the path as a hash or query if needed
        window.location.replace(basePath + 'index.html');
    </script>
</head>
<body>
    <p>Redirecting to main application...</p>
</body>
</html>
